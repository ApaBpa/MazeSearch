<html lang="en">

<head>
    <link rel="icon" href="/icons/favicon.ico?v=2" type="image/x-icon">
    <meta charset="UTF-8">
    <title>Maze Solver</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="container">
        <div class="controls">
            <div class="row">
                <h1 class="header1">Maze Solver</h1>
            </div>

            <div class="row">
                <h2 class="header2">Generate Maze</h2>
                <label>Width: <input type="number" id="widthInput" min="1" max="500" value="10"></label>
                <label>Height: <input type="number" id="heightInput" min="1" max="500" value="10"></label>
                <label>No. mazes: <input type="number" id="numMazes" min="1" max="100000" value="10"></label>
            </div>
            <div class="row">
                <label>Generator
                    <select id="generatorSelect">
                        <option value="prim">Prim's</option>
                    </select>
                </label>
                <button id="btnGenerate" >Generate</button>
                <p id="genInfo">No maze generated.</p>
            </div>

            <div class="row">
                <h2 class="header2">Solve Maze</h2>
                <label>Algorithm
                    <select id="algorithmSelect">
                        <option value="astar">A*</option>
                    </select>
                </label>
                <label>Mode
                    <select id="modeSelect">
                        <option value="inter">Inter-Maze Parallel</option>
                        <option value="intra">Intra-Maze Parallel</option>
                        <option value="combined">Inter + Intra</option>
                        <option value="sequential">Sequential</option>
                    </select>
                </label>
                <button id="btnSolve" disabled>Solve</button>
            </div>

            <div class="row">
                <h2 class="header2">Benchmark Results</h2>
                <button id="btnClear">Clear Results</button>
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Generator</th>
                            <th>Algorithm</th>
                            <th>Size</th>
                            <th>Cells</th>
                            <th>Gen (ms)</th>
                            <th>Solve (ms)</th>
                            <th>Path Length</th>
                            <th>Efficiency</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody">
                        <tr>
                            <td colspan="9" style="color:#555">No results yet.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="maze">
            <div class="mazeWrapper">
                <button id="prevMazeBtn" class="nav-btn prev">&#8592;</button>
                <canvas id="mazeCanvas" width="600" height="600"></canvas>
                <button id="nextMazeBtn" class="nav-btn next">&#8594;</button>
                <div class="mazeFooter">
                    <span id="mazeIndexInfo">Maze 1 of 10</span>
                    <div class="maze-btn-wrapper">
                        <button class="btn-reset-zoom" id="btn-reset-zoom">100%</button>
                        <button id="btn-zoom-out" class="btn-zoom-out icon-btn" title="Zoom out" aria-label="Zoom out">
                            <svg class="zoom-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                <circle cx="10" cy="10" r="6"></circle>
                                <line x1="14.5" y1="14.5" x2="20" y2="20"></line>
                                <line x1="7" y1="10" x2="13" y2="10"></line>
                            </svg>
                        </button>
                        <button id="btn-zoom-in" class="btn-zoom-in icon-btn" title="Zoom in" aria-label="Zoom in">
                            <svg class="zoom-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                <circle cx="10" cy="10" r="6"></circle>
                                <line x1="14.5" y1="14.5" x2="20" y2="20"></line>
                                <line x1="7" y1="10" x2="13" y2="10"></line>
                                <line x1="10" y1="7" x2="10" y2="13"></line>
                            </svg>
                        </button>
                        <button id="toggleViewBtn">Graph Representation</button>
                    </div>
                </div>
            </div>

            <div class="row">
                <h2 class="header2" style="text-align:center;"> Console Log</h2>
                <pre id="consoleLog"
                    style="background:#111; color:rgb(255, 255, 255); padding:8px; box-sizing:border-box; height:150px; overflow-y:auto; border:1px solid #007acc; white-space:pre-wrap;"></pre>
            </div>
        </div>
    </div>
</body>
<script type="module" src="/app.js"></script>
</html>
